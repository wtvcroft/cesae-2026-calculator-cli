name: CI (Continuous Integration)
on:
    push:
        branches: [main]
    pull_request:
 
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
 
            - name: Install the latest version of uv
              uses: astral-sh/setup-uv@v8.2.0
              with:
                python-version: 3.14.6
           
            - name: Run Test
              run: uv run --frozen pytest

